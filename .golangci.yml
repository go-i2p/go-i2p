version: "2"

run:
  timeout: 5m
  modules-download-mode: readonly

linters:
  default: none
  enable:
    - errcheck
    - staticcheck
    - ineffassign
    - govet
    - unused

  settings:
    errcheck:
      check-type-assertions: false
      check-blank: false
      exclude-functions:
        - os.Remove
        - os.RemoveAll
        - (io.Closer).Close
        - (*os.File).Close
        - (net.Conn).Close
    staticcheck:
      # Disable purely cosmetic/style suggestions
      checks:
        - "all"
        - "-QF1003"
        - "-QF1008"
        - "-QF1012"

  exclusions:
    rules:
      # Test files: relax errcheck
      - path: '.*_test\.go'
        linters:
          - errcheck

issues:
  max-same-issues: 0
