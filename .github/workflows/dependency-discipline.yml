name: Dependency Discipline

on:
  pull_request:
    branches: [ main, master ]
    paths:
      - go.mod
      - go.sum
      - .github/scripts/check-dependency-deltas.bash
      - .github/scripts/verify-dependency-compatibility.bash
      - .github/workflows/dependency-discipline.yml
  schedule:
    - cron: "0 9 * * 1"
  workflow_dispatch:

jobs:
  dependency-deltas:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v4
        with:
          go-version: "1.26"
      - name: Report tracked dependency deltas
        run: bash .github/scripts/check-dependency-deltas.bash | tee dependency-deltas.txt
      - name: Upload report artifact
        uses: actions/upload-artifact@v4
        with:
          name: dependency-deltas
          path: dependency-deltas.txt

  compatibility-check:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v4
        with:
          go-version: "1.26"
      - name: Compatibility checks for tracked dependency bumps
        run: bash .github/scripts/verify-dependency-compatibility.bash true